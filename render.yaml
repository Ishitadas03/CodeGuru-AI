services:
  # FastAPI Backend Web Service
  - type: web
    name: codeguru-backend
    env: python
    buildCommand: cd backend && pip install -r pyproject.toml
    startCommand: cd backend && alembic upgrade head || true && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false # User will paste Supabase connection string here
      - key: REDIS_URL
        fromService:
          type: redis
          name: codeguru-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # User will provide Google Gemini API key
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false

  # Managed Redis Service for quota checking
  - type: redis
    name: codeguru-redis
    ipAllowList: [] # Access restricted to internal services
    plan: free
