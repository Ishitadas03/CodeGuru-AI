version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: codeguru-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-codeguru}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codeguru"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: codeguru-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeguru-backend-prod
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY:-PROD_SECRET_KEY_PLACEHOLDER_1234567890}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codeguru-celery-prod
    restart: always
    command: celery -A app.main worker --loglevel=warning -c 2
    environment:
      - POSTGRES_SERVER=postgres
      - REDIS_HOST=redis
      - SECRET_KEY=${SECRET_KEY:-PROD_SECRET_KEY_PLACEHOLDER_1234567890}
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codeguru-frontend-prod
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=/api/v1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: codeguru-nginx-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    depends_on:
      - frontend
      - backend

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: codeguru-prometheus-prod
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:10.0.0
    container_name: codeguru-grafana-prod
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    depends_on:
      - prometheus

volumes:
  postgres_data_prod:
  redis_data_prod:
  prometheus_data:
  grafana_data:
